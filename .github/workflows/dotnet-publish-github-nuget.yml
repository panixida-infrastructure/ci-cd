on:
  workflow_call:
    inputs:
      project_folder:
        type: string
        default: "."
      output_folder:
        type: string
        default: "./out"
    secrets:
      GH_PACKAGES_TOKEN:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/dotnet-pack@main
        with:
          project_folder: ${{ inputs.project_folder }}
          output_folder: ${{ inputs.output_folder }}

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "${{ inputs.output_folder }}/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GH_PACKAGES_TOKEN }}"
  
