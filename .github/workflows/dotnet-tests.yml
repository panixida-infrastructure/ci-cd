on:
  workflow_call:
    secrets:
      registry-user:
        required: true
      registry-token:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      REPORT_DIRECTORY: tests-report
      COVERAGE_DIRECTORY: tests-report/coverage

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Create nuget.config
        if: ${{ vars.NUGET_CONFIG != '' }}
        env:
          NUGET_CONFIG: ${{ vars.NUGET_CONFIG }}
          NUGET_PROVIDER: ${{ vars.NUGET_PROVIDER }}
          REGISTRY_USER: ${{ secrets.registry-user }}
          REGISTRY_TOKEN: ${{ secrets.registry-token }}
        run: |
          echo "$NUGET_CONFIG" | envsubst > "${{ vars.PROJECT_FOLDER }}/nuget.config"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/global.json', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: dotnet restore
        working-directory: ${{ vars.PROJECT_FOLDER }}
        run: |
          dotnet restore

      - name: Run tests with coverage
        working-directory: ${{ vars.PROJECT_FOLDER }}
        run: |
          set -eo pipefail
          mkdir -p "$REPORT_DIRECTORY"

          dotnet test \
            --no-restore \
            --results-directory "$REPORT_DIRECTORY" \
            --coverage \
            --coverage-output-format cobertura \
            --coverage-output coverage.cobertura.xml \
            --report-trx \
            --report-trx-filename test_results.trx

      - name: Publish test results
        if: ${{ always() && hashFiles('tests-report/**/*.trx') != '' }}
        uses: dorny/test-reporter@v3
        with:
          name: Tests
          path: tests-report/**/*.trx
          reporter: dotnet-trx
          fail-on-error: "false"

      - name: Install reportgenerator
        if: ${{ always() && hashFiles('tests-report/**/coverage.cobertura.xml', 'tests-report/coverage.cobertura.xml') != '' }}
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.16
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate coverage summary
        if: ${{ always() && hashFiles('tests-report/**/coverage.cobertura.xml', 'tests-report/coverage.cobertura.xml') != '' }}
        run: |
          reportgenerator \
            -reports:"${{ env.REPORT_DIRECTORY }}/**/coverage.cobertura.xml;${{ env.REPORT_DIRECTORY }}/coverage.cobertura.xml" \
            -targetdir:"$COVERAGE_DIRECTORY" \
            -reporttypes:"MarkdownSummary;TextSummary" \
            -assemblyfilters:"${{ vars.COVERAGE_ASSEMBLY_FILTERS }}"

      - name: Add coverage to job summary
        if: ${{ always() && hashFiles('tests-report/coverage/Summary.md') != '' }}
        run: |
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          cat "$COVERAGE_DIRECTORY/Summary.md" >> $GITHUB_STEP_SUMMARY

      - name: Assert coverage threshold
        if: ${{ always() && hashFiles('tests-report/coverage/Summary.txt') != '' }}
        run: |
          LINE_COVERAGE=$(grep -Po 'Line coverage[:\s]+\K[\d.]+' "$COVERAGE_DIRECTORY/Summary.txt" | head -1 || echo 0)
          echo "📊 Line coverage: ${LINE_COVERAGE}% (threshold: ${{ vars.COVERAGE_THRESHOLD }}%)"
          awk -v c="$LINE_COVERAGE" -v t="${{ vars.COVERAGE_THRESHOLD }}" 'BEGIN{exit (c+0<t+0)}' \
            || { echo "❌ Coverage ${LINE_COVERAGE}% ниже порога ${{ vars.COVERAGE_THRESHOLD }}%"; exit 1; }
