on:
  workflow_call:
    inputs:
      service-folder:
        required: true
        type: string
      image:
        required: false
        type: string
        default: ""
      service-name:
        required: false
        type: string
        default: ""
      environment:
        required: false
        type: string
        default: ""

    secrets:
      registry-user:
        required: true
      registry-token:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker login
        run: |
          unset DOCKER_HOST
          echo "${{ secrets.registry-token }}" | docker login "${{ vars.REGISTRY_URL }}" -u "${{ secrets.registry-user }}" --password-stdin

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Resolve image tags
        id: image
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          SERVICE_NAME: ${{ inputs.service-name }}
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_IMAGE:-}" ]; then
            echo "tags=${INPUT_IMAGE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${SERVICE_NAME:-}" ]; then
            echo "::error::Either image or service-name input is required"
            exit 1
          fi

          if [ -z "${REGISTRY_URL:-}" ]; then
            echo "::error::REGISTRY_URL variable is required"
            exit 1
          fi

          case "${GITHUB_REF_NAME}" in
            main|master)
              env_suffix="prod"
              ;;
            stage)
              env_suffix="stage"
              ;;
            develop|development|dev)
              env_suffix="dev"
              ;;
            *)
              env_suffix=""
              ;;
          esac

          repository="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          service_repository="${REGISTRY_URL}/${repository}/${SERVICE_NAME}"

          {
            echo "tags<<EOF"
            echo "${service_repository}:${GITHUB_RUN_NUMBER}"
            if [ -n "${env_suffix}" ]; then
              echo "${service_repository}:latest-${env_suffix}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create nuget.config
        if: ${{ vars.NUGET_CONFIG != '' }}
        env:
          NUGET_CONFIG: ${{ vars.NUGET_CONFIG }}
          NUGET_PROVIDER: ${{ vars.NUGET_PROVIDER }}
          REGISTRY_USER: ${{ secrets.registry-user }}
          REGISTRY_TOKEN: ${{ secrets.registry-token }}
        run: |
          echo "$NUGET_CONFIG" | envsubst > ${{ vars.PROJECT_FOLDER }}/nuget.config

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ vars.PROJECT_FOLDER }}
          file: ${{ vars.PROJECT_FOLDER }}/${{ inputs.service-folder }}/Dockerfile
          push: true

          tags: |
            ${{ steps.image.outputs.tags }}

          build-args: |
            ENVIRONMENT=${{ inputs.environment }}

          cache-from: type=gha,scope=${{ github.repository }}
          cache-to: type=gha,mode=max,scope=${{ github.repository }}
